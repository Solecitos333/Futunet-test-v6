<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link rel="canonical" href="https://futunet.com.do/offline.html" />

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#0B7EB5" />
  <title>Sin conexión | Futunet</title>
  <style>
    :root { color-scheme: light; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    * { box-sizing: border-box; }
    body { min-height: 100vh; margin: 0; display: grid; place-items: center; padding: 24px; background: linear-gradient(160deg, #eef8fd, #fff 55%); color: #0f2533; }
    main { width: min(560px, 100%); padding: 36px; border: 1px solid #d8e9f2; border-radius: 24px; background: #fff; box-shadow: 0 24px 70px rgba(15, 37, 51, .12); text-align: center; }
    img { width: min(220px, 70%); height: auto; }
    h1 { margin: 24px 0 10px; font-size: clamp(1.8rem, 7vw, 2.6rem); }
    p { margin: 0 auto 24px; max-width: 42ch; line-height: 1.65; color: #526b7a; }
    button { min-height: 48px; padding: 0 22px; border: 0; border-radius: 999px; background: #0B7EB5; color: #fff; font: inherit; font-weight: 700; cursor: pointer; }
    button:focus-visible { outline: 3px solid rgba(11, 126, 181, .35); outline-offset: 3px; }
  </style>
</head>
<body>
  <main>
    <img src="img/logo-navbar.webp" alt="Futunet" width="972" height="303" />
    <h1>Estás sin conexión</h1>
    <p>No pudimos cargar esta página. Revisa tu conexión a internet y vuelve a intentarlo.</p>
    <button type="button" onclick="window.location.reload()">Reintentar</button>
  </main>
</body>
</html>
